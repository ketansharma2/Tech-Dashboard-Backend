#
#   docker compose up -d --build      # build & start
#   docker compose logs -f backend    # tail logs
#   docker compose down               # stop & remove
#
services:
  maven-dashboard:
    build:
      context: .
      dockerfile: dockerfile
    image: maven-dashboard-backend:latest
    container_name: maven-dashboard-backend
    restart: unless-stopped
    init: true # forward SIGTERM for a clean shutdown of the pg pool
    env_file:
      - .env
    ports:
      - 5000:5000 # host:container (external:internal) — clients hit :5000
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:5000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
