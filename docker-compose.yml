services:
  backend:
    image: ${IMAGE_URI:-maven-dashboard-backend:latest}
    container_name: maven-dashboard-backend
    restart: unless-stopped
    environment:
      RUN_MIGRATIONS: 'false'
    env_file:
      - ${ENV_FILE:-.env}
    ports:
      - '5000:5000'
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:5000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
