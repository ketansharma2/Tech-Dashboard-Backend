name: Deploy · development

# SCAFFOLDED — not active until you create a `development` GitHub Environment
# and a separate dev EC2 instance (see DEPLOYMENT.md § "Adding a dev environment").
# Until then this workflow will fail fast because vars.AWS_ROLE_ARN is empty for
# that environment, so it won't touch production. Pushing to `dev` triggers it.
on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: deploy-development
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: development
      tag-prefix: dev
      env-file: .env.dev
